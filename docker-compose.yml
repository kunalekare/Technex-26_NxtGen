services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: calc-db
    restart: always
    environment:
      MYSQL_DATABASE: drupal_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"

  # Drupal (PHP 8.1)
  cms:
    image: drupal:10.5.6-php8.1-fpm
    container_name: calc-cms
    depends_on:
      - db
    volumes:
      - ./cms:/var/www/html
    ports:
      - "8888:80"

  # Next.js 15 (Node 22.11.0)
  frontend:
    image: node:22.11.0
    container_name: calc-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: "npm run dev"
