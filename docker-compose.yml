services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: calc-db
    restart: always
    environment:
      MYSQL_DATABASE: drupal_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./frontend/src/db/init.sql:/docker-entrypoint-initdb.d/01-sip-calculator.sql

  # Drupal (PHP 8.1)
  cms:
    image: drupal:10.5.6-php8.1-fpm
    container_name: calc-cms
    depends_on:
      - db
    volumes:
      - ./cms:/var/www/html
    ports:
      - "8888:80"

  # Next.js 15 (Node 22.11.0)
  frontend:
    image: node:22.11.0
    container_name: calc-frontend
    working_dir: /app
    depends_on:
      - db
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root_password
      MYSQL_DATABASE: sip_calculator
    command: "npm run dev"

volumes:
  db_data:
